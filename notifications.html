<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>알림 — GUGU.</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0A0A0A;--s1:#111114;--s2:#171719;--s3:#1e1e22;
  --b1:#242428;--b2:#2e2e34;
  --r:#FF3B3B;--o:#FF8A00;--g:#22c55e;--bl:#6366f1;
  --t:#F2F2F5;--t2:#8a8a9a;--t3:#464650;
  --max:1100px;
}
body {background:var(--bg);color:var(--t);font-family:'Noto Sans KR',sans-serif;font-size:14px;padding-top:54px}
nav {position:fixed;top:0;z-index:200;background:rgba(10,10,10,.95);border-bottom:1px solid var(--b1)}
.nav-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;height:56px;padding:0 28px;gap:16px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;color:var(--t);text-decoration:none}.logo em{color:var(--r);font-style:normal}
.nav-title{font-size:16px;font-weight:700;color:var(--t)}
.nav-r{margin-left:auto;display:flex;gap:8px}
.btn-sm{padding:6px 14px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-ghost{background:none;border:1px solid var(--b2);color:var(--t2)}.btn-ghost:hover{color:var(--t)}

.wrap{max-width:720px;margin:0 auto;padding:32px 28px 80px}

/* 필터 탭 */
.notif-tabs{display:flex;gap:6px;margin-bottom:20px}
.nt{padding:7px 16px;border-radius:99px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--b1);background:none;color:var(--t2);font-family:inherit;transition:.2s;position:relative}
.nt:hover{border-color:var(--b2);color:var(--t)}.nt.on{background:var(--r);border-color:var(--r);color:#fff}
.nt .cnt{position:absolute;top:-5px;right:-5px;background:var(--r);color:#fff;font-size:9px;font-weight:700;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1.5px solid var(--bg)}
.nt.on .cnt{display:none}

/* 날짜 그룹 */
.notif-date{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--t3);text-transform:uppercase;padding:8px 0;margin-bottom:2px}

/* 알림 카드 */
.notif-item{
  display:flex;align-items:flex-start;gap:14px;
  padding:16px;background:var(--s1);border:1px solid var(--b1);
  border-radius:13px;margin-bottom:8px;cursor:pointer;transition:.2s;
  position:relative;text-decoration:none;
}
.notif-item:hover{border-color:var(--b2)}
.notif-item.unread{background:var(--s1);border-color:rgba(255,59,59,.18)}
.notif-item.unread::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--r);border-radius:13px 0 0 13px}
.ni-icon{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.ni-new-gugu{background:rgba(255,59,59,.12)}
.ni-deadline{background:rgba(255,138,0,.12)}
.ni-order{background:rgba(34,197,94,.12)}
.ni-follow{background:rgba(99,102,241,.12)}
.ni-system{background:rgba(100,100,120,.12)}
.ni-body{flex:1;min-width:0;overflow-x:hidden}
.ni-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:3px}
.ni-title{font-size:14px;font-weight:700;color:var(--t);line-height:1.4}
.notif-item.unread .ni-title{color:var(--t)}
.notif-item:not(.unread) .ni-title{color:var(--t2)}
.ni-time{font-size:11px;color:var(--t3);white-space:nowrap;flex-shrink:0}
.ni-desc{font-size:13px;color:var(--t2);line-height:1.5}
.ni-tag{display:inline-flex;align-items:center;gap:4px;margin-top:6px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:6px}
.tag-r{background:rgba(255,59,59,.1);color:var(--r)}
.tag-o{background:rgba(255,138,0,.1);color:var(--o)}
.tag-g{background:rgba(34,197,94,.1);color:var(--g)}
.tag-b{background:rgba(99,102,241,.1);color:var(--bl)}
.ni-thumb{width:48px;height:48px;border-radius:9px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}

/* 읽음 처리 버튼 */
.notif-actions{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.na-left{font-size:13px;color:var(--t2)}.na-left span{color:var(--r);font-weight:600}
.mark-all{font-size:13px;color:var(--t2);cursor:pointer;background:none;border:none;font-family:inherit;text-decoration:underline}
.mark-all:hover{color:var(--t)}

/* 빈 상태 */
.empty-state{text-align:center;padding:64px 0}
.es-icon{font-size:52px;margin-bottom:16px;opacity:.3}
.es-title{font-size:18px;font-weight:700;color:var(--t);margin-bottom:8px}
.es-desc{font-size:14px;color:var(--t2);line-height:1.7}


/* ══════════════════════════════════════
   MOBILE RESPONSIVE — notifications.html
══════════════════════════════════════ */




/* ══════ 공통 모바일 요소 ══════ */


/* 햄버거 드로어 메뉴 */
.mob-menu-btn { display:none; width:36px; height:36px; border-radius:8px; background:var(--s2,#171719); border:1px solid var(--b1,#242428); align-items:center; justify-content:center; cursor:pointer; font-size:18px; color:var(--t2,#8a8a9a); flex-shrink:0; }
.mob-drawer{display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.82);align-items:flex-end;}
.mob-drawer.open{display:flex;}
.mob-drawer-inner { background:var(--s1,#111114); width:100%; border-radius:20px 20px 0 0; padding:20px 20px 40px; transform:translateY(100%); transition:transform .3s ease; }
.mob-drawer.open .mob-drawer-inner { transform:translateY(0); }
.mob-drawer-handle { width:36px; height:4px; background:var(--b2,#2e2e34); border-radius:2px; margin:0 auto 20px; }
.mob-drawer-cats { display:flex; flex-direction:column; gap:6px; margin-bottom:20px; }
.mob-drawer-cats a { padding:12px 16px; border-radius:10px; font-size:15px; font-weight:600; color:var(--t,#F2F2F5); text-decoration:none; border:1px solid var(--b1,#242428); background:var(--s2,#171719); display:flex; align-items:center; gap:10px; }
.mob-drawer-btns { display:flex; gap:8px; }
.mob-drawer-btns button { flex:1; padding:12px; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; }
.mob-search-bar { display:none; align-items:center; gap:8px; background:var(--s2,#171719); border:1px solid var(--b1,#242428); border-radius:10px; padding:10px 14px; margin:6px 16px 0; }
.mob-search-bar input { background:none; border:none; outline:none; color:var(--t,#F2F2F5); font-size:14px; font-family:inherit; width:100%; }







@media (max-width:768px){
.page-wrap { padding:16px 16px 80px !important; }
  .filter-tabs { flex-wrap:nowrap !important; overflow-x:auto !important; padding-bottom:4px; }
  .filter-tabs::-webkit-scrollbar { display:none; }
  .notif-item { padding:12px 14px !important; }
  .ni-text { font-size:13px !important; }
  .ni-thumb { display:none !important; }
  .page-head { padding:0 0 16px !important; }
/* 네비 공통 */
  .mob-menu-btn { display:flex !important; }
  .mob-search-bar { display:flex !important; }
  /* 하단 탭바 */
  .mob-bottom-nav { display:flex !important; }
  body { padding-bottom:60px; }
.mob-menu-btn { display:flex !important; }
  .mob-search-bar { display:flex !important; }
.mob-bottom-nav { display: flex !important; }
input, select, textarea { font-size: 16px !important; }
}
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a class="logo" href="index.html">GUGU<em>.</em></a>
    <div class="nav-title">알림</div>
    <div class="nav-r">
      <button class="btn-sm btn-ghost" onclick="markAllRead()">모두 읽음</button>
    </div>
  </div>
</nav>

<div class="wrap">
  <div class="notif-tabs">
    <button class="nt on" onclick="setTab(this,'all')">전체<span class="cnt">8</span></button>
    <button class="nt" onclick="setTab(this,'gugu')">새 공구<span class="cnt">3</span></button>
    <button class="nt" onclick="setTab(this,'deadline')">마감임박<span class="cnt">2</span></button>
    <button class="nt" onclick="setTab(this,'order')">주문/배송<span class="cnt">2</span></button>
    <button class="nt" onclick="setTab(this,'system')">시스템</button>
  </div>

  <div class="notif-actions">
    <div class="na-left">읽지 않은 알림 <span>8개</span></div>
    <button class="mark-all" onclick="markAllRead()">모두 읽음 처리</button>
  </div>

  <div id="notif-list">
    <div class="empty-state" id="notifEmpty" style="display:none">
      <div class="es-icon">🔔</div>
      <div class="es-title">알림이 없어요</div>
      <div class="es-desc">팔로우한 인플루언서의 새 공구나 주문 소식을 여기서 확인할 수 있어요.</div>
    </div>
  </div>
</div>

<script>
let allNotifs = [];
let currentType = 'all';

const typeIconMap = {
  new_gugu: {cls:'ni-new-gugu', icon:'🛍️', tag:'🔥 새 공구', tagCls:'tag-r'},
  deadline: {cls:'ni-deadline', icon:'⏰', tag:'⏰ 마감임박', tagCls:'tag-o'},
  order: {cls:'ni-order', icon:'📦', tag:'📦 주문', tagCls:'tag-g'},
  shipped: {cls:'ni-order', icon:'🚚', tag:'🚚 배송 시작', tagCls:'tag-g'},
  delivered: {cls:'ni-order', icon:'✅', tag:'✅ 배송 완료', tagCls:'tag-g'},
  follow: {cls:'ni-follow', icon:'👤', tag:'팔로우', tagCls:'tag-b'},
  system: {cls:'ni-system', icon:'📢', tag:'📢 공지', tagCls:'tag-b'},
};

function relTime(ts){
  const d = new Date(ts);
  const now = new Date();
  const diff = Math.floor((now - d)/1000);
  if(diff<60) return '방금';
  if(diff<3600) return `${Math.floor(diff/60)}분 전`;
  if(diff<86400) return `${Math.floor(diff/3600)}시간 전`;
  if(diff<172800) return '어제';
  return `${d.getMonth()+1}월 ${d.getDate()}일`;
}

function renderNotifs(notifs){
  const list = document.getElementById('notif-list');
  const empty = document.getElementById('notifEmpty');
  const filtered = currentType==='all' ? notifs : notifs.filter(n=>n.type===currentType||
    (currentType==='order'&&['order','shipped','delivered'].includes(n.type))||
    (currentType==='gugu'&&['new_gugu','deadline'].includes(n.type)));

  if(!filtered.length){ empty.style.display='block'; list.innerHTML=''; list.appendChild(empty); return; }
  empty.style.display='none';

  let html='';
  let lastDateStr='';
  filtered.forEach(n=>{
    const d=new Date(n.created_at);
    const today=new Date();
    const yesterday=new Date(today);yesterday.setDate(today.getDate()-1);
    let dateStr=d.toDateString()===today.toDateString()?'오늘':d.toDateString()===yesterday.toDateString()?'어제':`${d.getMonth()+1}월 ${d.getDate()}일`;
    if(dateStr!==lastDateStr){html+=`<div class="notif-date" style="${lastDateStr?'margin-top:16px':''}">${dateStr}</div>`;lastDateStr=dateStr;}
    const tm=typeIconMap[n.type]||typeIconMap['system'];
    const unread=!n.is_read?'unread':'';
    const link=n.link||'#';
    html+=`<a class="notif-item ${unread}" href="${link}" data-type="${n.type}" data-id="${n.id}" onclick="markRead(event,'${n.id}')">
      <div class="ni-icon ${tm.cls}">${tm.icon}</div>
      <div class="ni-body">
        <div class="ni-top"><div class="ni-title">${n.title}</div><div class="ni-time">${relTime(n.created_at)}</div></div>
        ${n.content?`<div class="ni-desc">${n.content}</div>`:''}
        <div class="ni-tag ${tm.tagCls}">${tm.tag}</div>
      </div>
    </a>`;
  });
  list.innerHTML=html;

  const unreadCnt=notifs.filter(n=>!n.is_read).length;
  document.querySelector('.na-left').innerHTML=`읽지 않은 알림 <span style="color:var(--r);font-weight:600">${unreadCnt}개</span>`;
}

function setTab(btn,type){
  document.querySelectorAll('.nt').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
  currentType=type;
  renderNotifs(allNotifs);
}

async function markRead(e,id){
  // mark single as read via API
  const {data:{session}} = await sb.auth.getSession();
  if(!session) return;
  fetch('/api/notifications/list',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+session.access_token},
    body:JSON.stringify({ids:[id]})
  });
  // update local state
  allNotifs=allNotifs.map(n=>n.id===id?{...n,is_read:true}:n);
  const el=e.currentTarget;
  if(el){el.classList.remove('unread');}
  const unreadCnt=allNotifs.filter(n=>!n.is_read).length;
  document.querySelector('.na-left').innerHTML=`읽지 않은 알림 <span style="color:var(--r);font-weight:600">${unreadCnt}개</span>`;
}

async function markAllRead(){
  const {data:{session}} = await sb.auth.getSession();
  if(!session) return;
  const ids=allNotifs.filter(n=>!n.is_read).map(n=>n.id);
  if(!ids.length) return;
  fetch('/api/notifications/list',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+session.access_token},
    body:JSON.stringify({ids})
  });
  allNotifs=allNotifs.map(n=>({...n,is_read:true}));
  renderNotifs(allNotifs);
}

(async()=>{
  const u = await getCurrentUser();
  if(!u){ location.href='login.html'; return; }

  const {data:{session}} = await sb.auth.getSession();
  // 알림 로드
  const res = await fetch('/api/notifications/list',{
    headers:{'Authorization':'Bearer '+session.access_token}
  });
  if(res.ok){
    const json=await res.json();
    allNotifs=json.notifications||[];
    renderNotifs(allNotifs);
  }

  // 실시간 구독
  sb.channel('notifs_'+u.id)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'notifications',filter:`user_id=eq.${u.id}`},
      payload=>{
        allNotifs=[payload.new,...allNotifs];
        renderNotifs(allNotifs);
      }
    )
    .subscribe();
})();
</script>
