<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GUGU. — 로그인</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F8F8F7;--white:#FFF;
  --border:#E8E8E8;--border2:#D8D8D8;
  --red:#EF4444;--red-light:#FEF2F2;--orange:#F97316;--green:#10B981;--green-light:#ECFDF5;--blue:#6366F1;--blue-light:#EEF2FF;
  --t1:#111;--t2:#6B7280;--t3:#9CA3AF;
  --max:1100px;
}
body{overflow-x:hidden;background:var(--bg);color:var(--t1);font-family:'Noto Sans KR',sans-serif;min-height:100vh;display:flex;flex-direction:column;padding-top:54px}
nav{background:rgba(255,255,255,.88);border-bottom:1px solid var(--border);padding:0 32px}
.nav-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;height:56px}
.logo{font-family:'Plus Jakarta Sans',sans-serif;font-size:22px;font-weight:800;letter-spacing:-.5px;text-decoration:none;color:var(--t1)}
.logo span{color:var(--red)}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;gap:80px}
.left{display:flex;flex-direction:column;gap:20px;max-width:360px}
.left-title{font-size:36px;font-weight:800;letter-spacing:-1px;line-height:1.2}
.left-title .red{color:var(--red)}
.left-sub{font-size:14px;color:var(--t2);line-height:1.7}
.left-points{display:flex;flex-direction:column;gap:10px;margin-top:8px}
.lp{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--t2)}
.lp-dot{width:20px;height:20px;border-radius:50%;background:rgba(255,59,59,0.12);border:1px solid rgba(255,59,59,0.25);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--red);flex-shrink:0}
.divider{width:1px;height:280px;background:var(--border)}
.form-box{width:380px;background:var(--white);border:1px solid var(--border);border-radius:16px;padding:32px}
.form-tabs{display:flex;margin-bottom:28px;background:var(--bg);border-radius:8px;padding:3px}
.ftab{flex:1;padding:8px;text-align:center;border-radius:6px;font-size:14px;cursor:pointer;transition:.15s;font-family:inherit;border:none;background:none;color:var(--t2)}
.ftab.active{background:var(--white);color:var(--t1);font-weight:600}
.form-group{margin-bottom:16px}
.form-label{font-size:12px;color:var(--t2);margin-bottom:6px;display:block;font-weight:500}
.form-input{width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--t1);font-size:14px;font-family:inherit;outline:none;transition:.2s}
.form-input:focus{border-color:var(--red)}
.form-input::placeholder{color:var(--t2)}
.form-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;font-size:12px}
.form-check{display:flex;align-items:center;gap:6px;color:var(--t2);cursor:pointer}
.form-check input{accent-color:var(--red)}
.form-link{color:var(--t2);text-decoration:none}
.form-link:hover{color:var(--t1)}
.btn-submit{width:100%;padding:13px;border-radius:10px;border:none;background:var(--red);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:16px}
.btn-submit:hover{background:#e63535}
.social-divider{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.social-divider span{font-size:12px;color:var(--t2);white-space:nowrap}
.social-divider::before,.social-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.social-btns{display:flex;gap:8px;margin-bottom:20px}
.social-btn{flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--t1);font-size:13px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px}
.social-btn:hover{background:var(--bg)}
.form-bottom{text-align:center;font-size:13px;color:var(--t2)}
.form-bottom a{color:var(--red);text-decoration:none;font-weight:600}
.signup-panel{display:none}
.type-select{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.type-card{padding:16px;border-radius:10px;border:1px solid var(--border);background:none;cursor:pointer;text-align:center;transition:.2s;font-family:inherit}
.type-card:hover{border-color:var(--t2)}
.type-card.active{border-color:var(--red);background:rgba(255,59,59,0.06)}
.type-card .tc-icon{font-size:24px;margin-bottom:6px}
.type-card .tc-name{font-size:13px;font-weight:600;color:var(--t1)}
.type-card .tc-desc{font-size:11px;color:var(--t2);margin-top:2px}

/* 햄버거 드로어 메뉴 */
.mob-menu-btn { display:none; width:36px; height:36px; border-radius:8px; background:var(--bg,#F8F8F7); border:1px solid var(--border,#E8E8E8); align-items:center; justify-content:center; cursor:pointer; font-size:18px; color:var(--t2,#6B7280); flex-shrink:0; }
.mob-drawer{display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.82);align-items:flex-end;}
.mob-drawer.open{display:flex;}
.mob-drawer-inner { background:var(--white,#FFF); width:100%; border-radius:20px 20px 0 0; padding:20px 20px 40px; transform:translateY(100%); transition:transform .3s ease; }
.mob-drawer.open .mob-drawer-inner { transform:translateY(0); }
.mob-drawer-handle { width:36px; height:4px; background:var(--border2,#D8D8D8); border-radius:2px; margin:0 auto 20px; }
.mob-drawer-cats { display:flex; flex-direction:column; gap:6px; margin-bottom:20px; }
.mob-drawer-cats a { padding:12px 16px; border-radius:10px; font-size:15px; font-weight:600; color:var(--t1,#111); text-decoration:none; border:1px solid var(--border,#E8E8E8); background:var(--bg,#F8F8F7); display:flex; align-items:center; gap:10px; }
.mob-drawer-btns { display:flex; gap:8px; }
.mob-drawer-btns button { flex:1; padding:12px; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; }
.mob-search-bar { display:none; align-items:center; gap:8px; background:var(--bg,#F8F8F7); border:1px solid var(--border,#E8E8E8); border-radius:10px; padding:10px 14px; margin:6px 16px 0; }
.mob-search-bar input { background:none; border:none; outline:none; color:var(--t1,#111); font-size:14px; font-family:inherit; width:100%; }







@media (max-width:768px){
body { display:flex; align-items:flex-start; justify-content:center; }
  .login-wrap { padding:20px 16px 60px !important; width:100% !important; }
  .form-box { width:100% !important; max-width:100% !important; padding:20px 16px !important; }
  .type-select { grid-template-columns:1fr !important; gap:8px !important; }
  .social-buttons { flex-direction:column !important; }
/* 네비 공통 */
  .mob-menu-btn { display:flex !important; }
  .mob-search-bar { display:flex !important; }
  /* 하단 탭바 */
  .mob-bottom-nav { display:flex !important; }
  body { padding-bottom:60px; }
.mob-menu-btn { display:flex !important; }
  .mob-search-bar { display:flex !important; }
.mob-bottom-nav { display: flex !important; }
input, select, textarea { font-size: 16px !important; }
}
</style>

<script>
// 이미 로그인된 경우 리디렉션
(async()=>{
  const u = await getCurrentUser();
  if(u){
    if(u.profile?.role==='influencer') location.href='influencer-dashboard.html';
    else location.href='index.html';
  }
})();

function switchTab(name, el){
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('login-panel').style.display=name==='login'?'block':'none';
  document.getElementById('signup-panel').style.display=name==='signup'?'block':'none';
}
function switchTabByName(name){
  const tabs=document.querySelectorAll('.ftab');
  tabs[name==='login'?0:1].click();
}

let selectedRole = 'consumer';
function selectType(el){
  document.querySelectorAll('.type-card').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  selectedRole = el.querySelector('.tc-name').textContent.includes('인플루언서') ? 'influencer' : 'consumer';
}

async function doLogin(){
  const email = document.getElementById('loginEmail').value.trim();
  const pw = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');

  if(!email || !pw){ errEl.style.display='block'; errEl.textContent='이메일과 비밀번호를 입력해주세요.'; return; }

  btn.textContent='로그인 중...'; btn.disabled=true;
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });

  if(error){
    errEl.style.display='block';
    errEl.textContent = error.message.includes('Invalid') ? '이메일 또는 비밀번호가 올바르지 않습니다.' : error.message;
    btn.textContent='로그인'; btn.disabled=false;
    return;
  }

  // 프로필에서 역할 확인 후 리디렉션
  const { data: profile } = await sb.from('profiles').select('role').eq('id', data.user.id).single();
  if(profile?.role==='influencer') location.href='influencer-dashboard.html';
  else if(profile?.role==='admin') location.href='admin.html';
  else location.href='index.html';
}

async function doKakaoLogin(){
  // Kakao OAuth via custom server route
  location.href = '/api/auth/kakao';
}

async function doGoogleLogin(){
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: location.origin + '/index.html' }
  });
  if(error) alert('Google 로그인 실패: ' + error.message);
}

// URL에서 에러 파라미터 확인 (OAuth 실패 시)
const urlParams = new URLSearchParams(location.search);
const oauthError = urlParams.get('error');
if(oauthError){
  const errEl = document.getElementById('loginError');
  const msgs = {
    kakao_token: '카카오 로그인 중 오류가 발생했어요. 다시 시도해주세요.',
    kakao_user: '카카오 사용자 정보를 가져올 수 없어요.',
    kakao_session: '카카오 인증은 되었지만 로그인 세션을 만들지 못했어요. 잠시 후 다시 시도해주세요.',
    kakao_server: '카카오 로그인 서버 처리 중 오류가 발생했어요.',
    server_config: '카카오 로그인 서버 설정이 아직 완료되지 않았어요.'
  };
  errEl.style.display='block';
  errEl.textContent = msgs[oauthError] || '로그인 중 오류가 발생했어요.';
}

async function doSignup(){
  const name = document.getElementById('signupName').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const pw = document.getElementById('signupPassword').value;
  const phone = document.getElementById('signupPhone').value.trim();
  const errEl = document.getElementById('signupError');
  const okEl = document.getElementById('signupSuccess');
  const btn = document.getElementById('signupBtn');

  errEl.style.display='none'; okEl.style.display='none';
  if(!name||!email||!pw){ errEl.style.display='block'; errEl.textContent='이름, 이메일, 비밀번호는 필수입니다.'; return; }
  if(pw.length<8){ errEl.style.display='block'; errEl.textContent='비밀번호는 8자 이상이어야 합니다.'; return; }

  btn.textContent='가입 중...'; btn.disabled=true;
  const { data, error } = await sb.auth.signUp({
    email, password: pw,
    options: { data: { name, phone, role: selectedRole } }
  });

  if(error){
    errEl.style.display='block'; errEl.textContent=error.message;
    btn.textContent='가입하기'; btn.disabled=false;
    return;
  }

  if(selectedRole==='influencer'){
    okEl.style.display='block';
    okEl.textContent='가입 완료! 이메일 인증 후 인플루언서 대시보드를 이용할 수 있어요.';
  } else {
    okEl.style.display='block';
    okEl.textContent='가입 완료! 이메일 인증 후 로그인해주세요.';
  }
  btn.textContent='가입 완료'; btn.disabled=true;
}
</script>
